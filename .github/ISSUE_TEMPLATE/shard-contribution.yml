name: Shard contribution
description: Contribute training tiles to the Ansel raw denoiser corpus (fallback — prefer scripts/submit_contribution.sh, which opens a pull request for you)
title: "[shards] contribution from <your-handle>"
labels: ["shard-contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for feeding the denoiser! Read [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md)
        first — it explains what ends up public and how to build the bundle with
        `scripts/pack_contribution.py`. If you have the `gh` CLI, prefer
        `sh scripts/submit_contribution.sh` — it opens the contribution pull
        request for you, no git knowledge needed. This form is the fallback.
  - type: input
    id: link
    attributes:
      label: Download link
      description: Where the maintainer can download your .tar.gz bundle (any file host).
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: sha256
    attributes:
      label: Bundle sha256
      description: Printed by pack_contribution.py after packing.
      placeholder: e.g. 4f1a9c...
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: Cameras included, anything unusual, etc.
  - type: checkboxes
    id: grant
    attributes:
      label: Rights and license
      options:
        - label: I own the rights to these photographs.
          required: true
        - label: I license the packed tiles under the [Ansel Training Data License 1.1](../blob/master/LICENSE-DATA.md) — anyone may use them with the ansel-denoise training stack to audit, reproduce and benchmark the training, or to train their own denoising models (whose weights are theirs, commercial use included); I understand that feeding them to any training stack able to learn anything else — style, generative AI — is explicitly forbidden, and that the tiles are published on the public shard release under that license.
          required: true
        - label: The images were shot at base ISO (the pack script enforced ISO ≤ 200).
          required: true
        - label: This contribution stays within the ~1000 images/person policy.
          required: true
