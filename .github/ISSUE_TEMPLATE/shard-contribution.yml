name: Shard contribution
description: Contribute training tiles to the Ansel raw denoiser corpus
title: "[shards] contribution from <your-handle>"
labels: ["shard-contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for feeding the denoiser! Read [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md)
        first — it explains what ends up public and how to build the bundle with
        `scripts/pack_contribution.py`. Then upload the single `.tar.gz` it produces
        to a file host that gives a **true direct download link** and fill this in.

        **Please prefer a real direct link** — Google Drive (Share → "Anyone
        with the link"), Dropbox, or a plain `https://…/file.tar.gz` on your own
        server. Some consumer transfer services (**swisstransfer, free.fr**)
        hide the file behind a JavaScript click-through with no direct link, so
        the maintainer has to fetch it by hand — please avoid those.
  - type: input
    id: link
    attributes:
      label: Download link
      description: A direct download link to your .tar.gz bundle (Google Drive "anyone with the link", Dropbox, your own server). Avoid swisstransfer/free.fr — they have no scriptable direct link.
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: sha256
    attributes:
      label: Bundle sha256 (optional)
      description: Printed by pack_contribution.py. Optional — some file hosts recompress the file, changing this hash; the bundle carries per-file checksums that the maintainer verifies regardless.
      placeholder: e.g. 4f1a9c...
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: Cameras included, anything unusual, etc.
  - type: checkboxes
    id: grant
    attributes:
      label: Rights and license
      options:
        - label: I own the rights to these photographs.
          required: true
        - label: I license the packed tiles under the [Ansel Training Data License 1.1](../blob/master/LICENSE-DATA.md) — anyone may use them with the ansel-denoise training stack to audit, reproduce and benchmark the training, or to train their own denoising models (whose weights are theirs, commercial use included); I understand that feeding them to any training stack able to learn anything else — style, generative AI — is explicitly forbidden, and that the tiles are published on the public shard release under that license.
          required: true
        - label: The images were shot at base ISO (the pack script enforced ISO ≤ 200).
          required: true
        - label: This contribution stays within the ~1000 images/person policy.
          required: true
